policies:
  - name: aws-s3-encryption-aj-tag
    resource: aws.s3
    mode:
      type: cloudtrail
      events:
        - CreateBucket
        - event: PutBucketEncryption
          source: s3.amazonaws.com
          ids: requestParameters.bucketName
        - event: DeleteBucketEncryption
          source: s3.amazonaws.com
          ids: requestParameters.bucketName
      pattern:
        detail:
          userIdentity:
            sessionContext:
              sessionIssuer:
                userName:
                  - anything-but: "AWSReservedSSO_AWSAdministratorAccess_39201616215f5da0"
    filters:
      - type: bucket-encryption
        state: False
      - tag:ajtest: absent
    actions:
      - type: tag
        key: ajtest
        value: 'myvar: {myvar} is the best'
